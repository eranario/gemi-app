name: Build Desktop App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target-triple: x86_64-unknown-linux-gnu
            artifact-glob: "frontend/src-tauri/target/release/bundle/deb/*.deb"
            artifact-name: gemi-linux-x86_64
          # Uncomment when ready to build for other platforms:
          # - os: macos-latest
          #   target-triple: aarch64-apple-darwin
          #   artifact-glob: "frontend/src-tauri/target/release/bundle/dmg/*.dmg"
          #   artifact-name: gemi-macos-arm64
          # - os: windows-latest
          #   target-triple: x86_64-pc-windows-msvc
          #   artifact-glob: "frontend/src-tauri/target/release/bundle/nsis/*.exe"
          #   artifact-name: gemi-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target-triple }})

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ───────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Python + uv ───────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the full venv — covers vendor installs (AgRowStitch, LightGlue) that
      # uv doesn't manage and are expensive to reinstall on every run.
      - name: Cache Python venv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: backend/.venv
          key: venv-${{ matrix.os }}-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}

      - name: Install Python dependencies
        working-directory: backend
        run: |
          uv sync
          # uv venv doesn't create a pip symlink — add it so build.sh works
          if [ ! -f .venv/bin/pip ]; then
            ln -s .venv/bin/pip3 .venv/bin/pip
          fi

      - name: Install vendor packages (AgRowStitch, LightGlue, bin_to_images)
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          if [ -d vendor/AgRowStitch ]; then
            .venv/bin/pip install -e vendor/AgRowStitch --no-build-isolation
          fi
          if [ -d vendor/LightGlue ]; then
            .venv/bin/pip install vendor/LightGlue
          fi
          if [ -d vendor/bin_to_images ]; then
            .venv/bin/pip install -e vendor/bin_to_images
          fi
          .venv/bin/pip install farm-ng-amiga || echo "WARNING: farm-ng-amiga install failed"

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      # ── Build PyInstaller backend sidecar ─────────────────────────────────────
      - name: Build backend sidecar (PyInstaller)
        working-directory: backend
        run: |
          uv run pyinstaller --clean gemi-backend.spec
          mkdir -p ../frontend/src-tauri/binaries
          cp dist/gemi-backend ../frontend/src-tauri/binaries/gemi-backend-${{ matrix.target-triple }}
          echo "Backend binary size: $(du -sh dist/gemi-backend | cut -f1)"

      # ── Build Tauri app ───────────────────────────────────────────────────────
      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build
        env:
          NO_AT_BRIDGE: "1"

      # ── Upload installer artifact ─────────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30
