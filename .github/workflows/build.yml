name: Build Desktop App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target-triple: x86_64-unknown-linux-gnu
            artifact-ext: deb
            artifact-glob: "frontend/src-tauri/target/release/bundle/deb/*.deb"
          - os: macos-latest
            target-triple: aarch64-apple-darwin
            artifact-ext: dmg
            artifact-glob: "frontend/src-tauri/target/release/bundle/dmg/*.dmg"
          - os: windows-latest
            target-triple: x86_64-pc-windows-msvc
            artifact-ext: msi
            artifact-glob: "frontend/src-tauri/target/release/bundle/nsis/*.exe"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Python + uv
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Rust
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      # Build backend sidecar
      - name: Build backend (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: backend
        run: |
          chmod +x build-desktop.sh
          ./build-desktop.sh

      - name: Build backend (Windows)
        if: runner.os == 'Windows'
        working-directory: backend
        shell: pwsh
        run: |
          uv run pyinstaller --clean gemi-backend.spec
          $binDir = "../frontend/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $binDir
          Copy-Item "dist/gemi-backend.exe" "$binDir/gemi-backend-${{ matrix.target-triple }}.exe"

      # Build Tauri app
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemi-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn
